id: marcus
name: Marcus
title: CEO Advisor
tagline: "The Board Chair"

model:
  max_tokens: 4096
  temperature: 0.7

voice:
  engine: disabled
  voice_id: ""
  speed: 1.0

vault:
  path: /vaults/marcus
  root_file: second-brain.md
  read_only_mounts: []
  writable_paths:
    - /vaults/marcus

memory:
  max_context_tokens: 4000

delegation:
  can_delegate_to: []
  accepts_from: [axon, huddle]

behavior:
  auto_save: true
  first_message: true
  proactive_checks:
    - trigger: daily
      action: check_inbox
      description: "Check inbox for delegated tasks from Axon or Huddle"
    - trigger: frequent
      action: work_on_tasks
      description: "Complete in_progress tasks and deliver results"

ui:
  color: "#EF4444"
  avatar: ""
  sparkle_color: "#F87171"

system_prompt_file: marcus_instructions.md
