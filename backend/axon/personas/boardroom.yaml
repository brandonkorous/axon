id: boardroom
name: The Boardroom
title: Advisory Board Session
tagline: "Where advisors debate, disagree, and converge"

model:
  reasoning: anthropic/claude-sonnet-4-20250514
  navigator: anthropic/claude-sonnet-4-20250514
  max_tokens: 8192
  temperature: 0.8

voice:
  engine: disabled
  voice_id: ""
  speed: 1.0

vault:
  path: /vaults/boardroom
  root_file: second-brain.md
  read_only_mounts:
    - path: /vaults/marcus
      root_file: second-brain.md
    - path: /vaults/raj
      root_file: second-brain.md
    - path: /vaults/diana
      root_file: second-brain.md
  writable_paths:
    - /vaults/boardroom

memory:
  max_context_tokens: 6000

delegation:
  can_delegate_to: []
  accepts_from: [axon]

behavior:
  auto_save: true
  first_message: true
  proactive_checks: []

ui:
  color: "#F59E0B"
  avatar: ""
  sparkle_color: "#FBBF24"

system_prompt_file: boardroom_instructions.md
