id: axon
name: Axon
title: Personal Assistant
tagline: "Your AI chief of staff"

model:
  # reasoning and navigator inherit from DEFAULT_MODEL env var
  # override here to use a different model for this agent
  max_tokens: 4096
  temperature: 0.7

voice:
  engine: piper
  voice_id: en_US-lessac-medium
  speed: 1.0

vault:
  path: /vaults/axon
  root_file: second-brain.md
  read_only_mounts: []
  writable_paths:
    - /vaults/axon

memory:
  max_context_tokens: 3000

delegation:
  can_delegate_to: ["*"]
  accepts_from: []

behavior:
  auto_save: true
  first_message: true
  proactive_checks:
    - trigger: frequent
      action: work_on_tasks
      description: "Complete in_progress tasks and deliver results"

ui:
  color: "#8B5CF6"
  avatar: ""
  sparkle_color: "#A78BFA"

system_prompt_file: axon_instructions.md
