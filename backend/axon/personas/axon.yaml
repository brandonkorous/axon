id: axon
name: Axon
title: Personal Assistant
tagline: "Your AI chief of staff"

model:
  reasoning: anthropic/claude-sonnet-4-20250514
  navigator: anthropic/claude-sonnet-4-20250514
  max_tokens: 4096
  temperature: 0.7

voice:
  engine: disabled
  voice_id: ""
  speed: 1.0

vault:
  path: /vaults/axon
  root_file: second-brain.md
  read_only_mounts: []
  writable_paths:
    - /vaults/axon

memory:
  max_context_tokens: 3000

delegation:
  can_delegate_to: ["*"]
  accepts_from: []

behavior:
  auto_save: true
  first_message: true
  proactive_checks: []

ui:
  color: "#8B5CF6"
  avatar: ""
  sparkle_color: "#A78BFA"

system_prompt_file: axon_instructions.md
