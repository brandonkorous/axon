id: diana
name: Diana
title: COO Advisor
tagline: "The Growth Operator"

model:
  max_tokens: 4096
  temperature: 0.7

voice:
  engine: disabled
  voice_id: ""
  speed: 1.0

vault:
  path: /vaults/diana
  root_file: second-brain.md
  read_only_mounts: []
  writable_paths:
    - /vaults/diana

memory:
  max_context_tokens: 4000

delegation:
  can_delegate_to: []
  accepts_from: [axon, huddle]

behavior:
  auto_save: true
  first_message: true
  proactive_checks:
    - trigger: daily
      action: check_inbox
      description: "Check inbox for delegated tasks from Axon or Huddle"
    - trigger: frequent
      action: work_on_tasks
      description: "Complete in_progress tasks and deliver results"

ui:
  color: "#10B981"
  avatar: ""
  sparkle_color: "#34D399"

system_prompt_file: diana_instructions.md
