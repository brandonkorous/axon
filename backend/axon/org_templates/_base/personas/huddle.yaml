id: huddle
name: The Huddle
title: Advisory Group Session
tagline: "Where your team debates, disagrees, and converges"

model:
  max_tokens: 8192
  temperature: 0.8

voice:
  engine: disabled
  voice_id: ""
  speed: 1.0

vault:
  path: /vaults/huddle
  root_file: second-brain.md
  read_only_mounts: {{ADVISOR_MOUNTS}}
  writable_paths:
    - /vaults/huddle

memory:
  max_context_tokens: 6000

delegation:
  can_delegate_to: []
  accepts_from: [axon]

behavior:
  auto_save: true
  first_message: true
  proactive_checks: []

ui:
  color: "#F59E0B"
  avatar: ""
  sparkle_color: "#FBBF24"

system_prompt_file: huddle_instructions.md
