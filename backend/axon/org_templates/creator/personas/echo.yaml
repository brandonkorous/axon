id: echo
name: Echo
title: Editor & Feedback Analyst
tagline: "Making good writing great"
model:
  max_tokens: 4096
  temperature: 0.7
voice:
  engine: disabled
  voice_id: ""
  speed: 1.0
vault:
  path: /vaults/echo
  root_file: second-brain.md
  read_only_mounts: []
  writable_paths:
    - /vaults/echo
memory:
  max_context_tokens: 4000
delegation:
  can_delegate_to: []
  accepts_from: [axon, huddle]
behavior:
  auto_save: true
  first_message: true
  proactive_checks: []
ui:
  color: "#60A5FA"
  avatar: ""
  sparkle_color: "#93C5FD"
system_prompt_file: echo_instructions.md
