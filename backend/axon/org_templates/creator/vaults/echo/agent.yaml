id: echo
name: Echo
title: Editor & Feedback Analyst
tagline: "Making good writing great"
type: advisor
model:
  max_tokens: 4096
  temperature: 0.7
vault:
  root_file: second-brain.md
  read_only_mounts: []
  writable_paths:
    - "."
memory:
  max_context_tokens: 4000
delegation:
