id: marcus
name: Marcus
title: CEO Advisor
title_tag: CEO
tagline: "The Board Chair"
type: advisor

model:
  max_tokens: 4096
  temperature: 0.7

vault:
  root_file: second-brain.md
  read_only_mounts: []
  writable_paths:
    - "."

memory:
  max_context_tokens: 4000

delegation:
  can_delegate_to: [researcher]
  accepts_from: [axon, huddle]

behavior:
  auto_save: true
  first_message: true
  proactive_checks: []

guardrails:
  domains:
    allowed_domains: [strategy, fundraising, financials, hiring, partnerships, vision, board governance]
    boundary_prompt: "Redirect deep technical questions to Raj (CTO) and operational/GTM questions to Diana (COO)."
confidence:
  mode: high
  tag_confidence: true

ui:
  color: "#EF4444"
  avatar: ""
  sparkle_color: "#F87171"
