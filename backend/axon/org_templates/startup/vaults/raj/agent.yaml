    allowed_domains: [architecture, infrastructure, tech debt, vendors, security, performance, scaling]
confidence:
  mode: exploration
  tag_confidence: true

skills:
  enabled_skills:
    - first_principles_thinking
    - design_audit

self_regulation:
  enabled: true

ui:
  color: "#3B82F6"
  avatar: ""
  sparkle_color: "#60A5FA"
