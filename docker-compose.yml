services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ${AXON_ORGS_DIR:-./orgs}:/orgs
      - /var/run/docker.sock:/var/run/docker.sock  # Sandbox container management
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-anthropic/claude-sonnet-4-20250514}
      - OLLAMA_BASE_URL=http://ollama:11434
      - AXON_ORGS_DIR=/orgs
      - AXON_LOG_LEVEL=${AXON_LOG_LEVEL:-INFO}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY:-}
    depends_on:
      ollama:
        condition: service_started
        required: false

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    volumes:
      - searxng_data:/etc/searxng
    profiles:
      - web-search

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    profiles:
      - local-llm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Pull recommended models on first start
  ollama-init:
    image: ollama/ollama:latest
    profiles:
      - local-llm
    depends_on:
      - ollama
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama to be ready..."
        until curl -s http://ollama:11434/api/tags > /dev/null 2>&1; do sleep 1; done
        echo "Pulling navigator model (llama3)..."
        curl -s http://ollama:11434/api/pull -d '{"name":"llama3"}' | head -1
        echo "Pulling reasoning model (${OLLAMA_MODEL:-qwen2.5:14b})..."
        curl -s http://ollama:11434/api/pull -d "{\"name\":\"${OLLAMA_MODEL:-qwen2.5:14b}\"}" | head -1
        echo "Models ready."
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}

volumes:
  ollama_models:
  searxng_data:
