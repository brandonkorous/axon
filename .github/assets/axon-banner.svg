<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Subtle warm radial -->
    <radialGradient id="bgWarm" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#F3EDE5"/>
      <stop offset="100%" stop-color="#E8E0D4"/>
    </radialGradient>

    <!-- Teal glow behind title -->
    <radialGradient id="titleGlow" cx="50%" cy="45%" r="25%">
      <stop offset="0%" stop-color="#6B9E9E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6B9E9E" stop-opacity="0"/>
    </radialGradient>

    <!-- Accent line fades -->
    <linearGradient id="lineFadeL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6B9E9E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6B9E9E" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="lineFadeR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6B9E9E" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6B9E9E" stop-opacity="0"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#37342F" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>

    <!-- Node glow -->
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Connection glow -->
    <filter id="connectionGlow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgWarm)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#titleGlow)"/>

  <!-- Neural network connections -->
  <g opacity="0.3" filter="url(#connectionGlow)">
    <!-- Left cluster -->
    <line x1="80" y1="90" x2="185" y2="155" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="50" y1="200" x2="185" y2="155" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="80" y1="310" x2="185" y2="245" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="50" y1="200" x2="185" y2="245" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="185" y1="155" x2="185" y2="245" stroke="#6B9E9E" stroke-width="0.5"/>
    <line x1="185" y1="155" x2="310" y2="180" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="185" y1="245" x2="310" y2="220" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="185" y1="155" x2="310" y2="120" stroke="#C07050" stroke-width="0.5"/>
    <line x1="185" y1="245" x2="310" y2="290" stroke="#C07050" stroke-width="0.5"/>
    <line x1="310" y1="120" x2="310" y2="180" stroke="#6B9E9E" stroke-width="0.4"/>
    <line x1="310" y1="220" x2="310" y2="290" stroke="#6B9E9E" stroke-width="0.4"/>
    <line x1="310" y1="180" x2="310" y2="220" stroke="#6B9E9E" stroke-width="0.4"/>

    <!-- Right cluster -->
    <line x1="1120" y1="90" x2="1015" y2="155" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="1150" y1="200" x2="1015" y2="155" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="1120" y1="310" x2="1015" y2="245" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="1150" y1="200" x2="1015" y2="245" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="1015" y1="155" x2="1015" y2="245" stroke="#6B9E9E" stroke-width="0.5"/>
    <line x1="1015" y1="155" x2="890" y2="180" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="1015" y1="245" x2="890" y2="220" stroke="#6B9E9E" stroke-width="0.7"/>
    <line x1="1015" y1="155" x2="890" y2="120" stroke="#C07050" stroke-width="0.5"/>
    <line x1="1015" y1="245" x2="890" y2="290" stroke="#C07050" stroke-width="0.5"/>
    <line x1="890" y1="120" x2="890" y2="180" stroke="#6B9E9E" stroke-width="0.4"/>
    <line x1="890" y1="220" x2="890" y2="290" stroke="#6B9E9E" stroke-width="0.4"/>
    <line x1="890" y1="180" x2="890" y2="220" stroke="#6B9E9E" stroke-width="0.4"/>

    <!-- Center-reaching connections -->
    <line x1="310" y1="180" x2="420" y2="195" stroke="#6B9E9E" stroke-width="0.5"/>
    <line x1="310" y1="220" x2="420" y2="205" stroke="#6B9E9E" stroke-width="0.5"/>
    <line x1="890" y1="180" x2="780" y2="195" stroke="#6B9E9E" stroke-width="0.5"/>
    <line x1="890" y1="220" x2="780" y2="205" stroke="#6B9E9E" stroke-width="0.5"/>
  </g>

  <!-- Neural nodes -->
  <g filter="url(#softGlow)">
    <!-- Left outer -->
    <circle cx="80" cy="90" r="2.5" fill="#6B9E9E" opacity="0.5"/>
    <circle cx="50" cy="200" r="3" fill="#6B9E9E" opacity="0.6"/>
    <circle cx="80" cy="310" r="2.5" fill="#6B9E9E" opacity="0.5"/>
    <!-- Left middle -->
    <circle cx="185" cy="155" r="3.5" fill="#6B9E9E" opacity="0.65"/>
    <circle cx="185" cy="245" r="3.5" fill="#6B9E9E" opacity="0.65"/>
    <!-- Left inner -->
    <circle cx="310" cy="120" r="2" fill="#C07050" opacity="0.5"/>
    <circle cx="310" cy="180" r="3" fill="#6B9E9E" opacity="0.6"/>
    <circle cx="310" cy="220" r="3" fill="#6B9E9E" opacity="0.6"/>
    <circle cx="310" cy="290" r="2" fill="#C07050" opacity="0.5"/>
    <!-- Near-center left -->
    <circle cx="420" cy="195" r="2" fill="#6B9E9E" opacity="0.35"/>
    <circle cx="420" cy="205" r="2" fill="#6B9E9E" opacity="0.35"/>

    <!-- Right outer -->
    <circle cx="1120" cy="90" r="2.5" fill="#6B9E9E" opacity="0.5"/>
    <circle cx="1150" cy="200" r="3" fill="#6B9E9E" opacity="0.6"/>
    <circle cx="1120" cy="310" r="2.5" fill="#6B9E9E" opacity="0.5"/>
    <!-- Right middle -->
    <circle cx="1015" cy="155" r="3.5" fill="#6B9E9E" opacity="0.65"/>
    <circle cx="1015" cy="245" r="3.5" fill="#6B9E9E" opacity="0.65"/>
    <!-- Right inner -->
    <circle cx="890" cy="120" r="2" fill="#C07050" opacity="0.5"/>
    <circle cx="890" cy="180" r="3" fill="#6B9E9E" opacity="0.6"/>
    <circle cx="890" cy="220" r="3" fill="#6B9E9E" opacity="0.6"/>
    <circle cx="890" cy="290" r="2" fill="#C07050" opacity="0.5"/>
    <!-- Near-center right -->
    <circle cx="780" cy="195" r="2" fill="#6B9E9E" opacity="0.35"/>
    <circle cx="780" cy="205" r="2" fill="#6B9E9E" opacity="0.35"/>
  </g>

  <!-- Accent lines flanking title -->
  <line x1="340" y1="200" x2="480" y2="200" stroke="url(#lineFadeL)" stroke-width="0.7" opacity="0.6"/>
  <line x1="720" y1="200" x2="860" y2="200" stroke="url(#lineFadeR)" stroke-width="0.7" opacity="0.6"/>

  <!-- Diamond accents -->
  <polygon points="480,196 484,200 480,204 476,200" fill="#6B9E9E" opacity="0.3"/>
  <polygon points="720,196 724,200 720,204 716,200" fill="#6B9E9E" opacity="0.3"/>

  <!-- Micro-dot field -->
  <g opacity="0.15">
    <circle cx="150" cy="50" r="1" fill="#37342F"/>
    <circle cx="340" cy="70" r="0.8" fill="#37342F"/>
    <circle cx="520" cy="45" r="0.6" fill="#37342F"/>
    <circle cx="700" cy="60" r="0.8" fill="#37342F"/>
    <circle cx="870" cy="40" r="1" fill="#37342F"/>
    <circle cx="1050" cy="55" r="0.7" fill="#37342F"/>
    <circle cx="200" cy="360" r="0.8" fill="#37342F"/>
    <circle cx="400" cy="345" r="0.6" fill="#37342F"/>
    <circle cx="600" cy="365" r="1" fill="#37342F"/>
    <circle cx="830" cy="350" r="0.7" fill="#37342F"/>
    <circle cx="1000" cy="370" r="0.8" fill="#37342F"/>
    <circle cx="130" cy="140" r="0.5" fill="#6B9E9E"/>
    <circle cx="1070" cy="140" r="0.5" fill="#6B9E9E"/>
    <circle cx="240" cy="340" r="0.5" fill="#C07050"/>
    <circle cx="960" cy="340" r="0.5" fill="#C07050"/>
  </g>

  <!-- Title -->
  <text x="600" y="192" text-anchor="middle" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="84" font-weight="800" letter-spacing="14" fill="#37342F">axon</text>

  <!-- Tagline -->
  <text x="600" y="245" text-anchor="middle" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" letter-spacing="6" fill="#6B9E9E" opacity="0.85">SELF-HOSTED AI COMMAND CENTER</text>

  <!-- Separator -->
  <line x1="520" y1="264" x2="680" y2="264" stroke="#6B9E9E" stroke-width="0.5" opacity="0.2"/>

  <!-- Open source badge -->
  <g opacity="0.45">
    <rect x="541" y="278" width="118" height="24" rx="12" fill="none" stroke="#C07050" stroke-width="0.7"/>
    <text x="600" y="294" text-anchor="middle" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="3" fill="#C07050">OPEN SOURCE</text>
  </g>

  <!-- Top and bottom borders -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#D1C6AB" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="399" x2="1200" y2="399" stroke="#D1C6AB" stroke-width="1" opacity="0.4"/>
</svg>