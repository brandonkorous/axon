name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      version: ${{ steps.bump.outputs.version }}
      previous: ${{ steps.bump.outputs.previous }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        run: |
          CURRENT=$(cat VERSION)
          echo "previous=$CURRENT" >> "$GITHUB_OUTPUT"

          # Get commits since last tag (or all commits if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s" -20)
          fi

          if [ -z "$COMMITS" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commits
          BUMP="none"
          if echo "$COMMITS" | grep -qE "^(feat|fix|refactor|perf|docs|style|test|chore)(\(.*\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^(fix|perf|refactor)(\(.*\))?:"; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Parse and bump semver
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP ($CURRENT → $NEW)"

      - name: Update VERSION and tag
        if: steps.bump.outputs.bumped == 'true'
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          echo "$VERSION" > VERSION

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags

  publish-images:
    needs: version
    if: needs.version.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.component }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.component }}:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository }}-${{ matrix.component }}:latest

  github-release:
    needs: [version, publish-images]
    if: needs.version.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Generate release notes
        id: notes
        run: |
          PREVIOUS="v${{ needs.version.outputs.previous }}"
          # Get conventional commit summaries
          NOTES=$(git log "${PREVIOUS}..HEAD" --pretty=format:"- %s" \
            --grep="^feat" --grep="^fix" --grep="^perf" --all-match 2>/dev/null || \
            git log "${PREVIOUS}..HEAD" --pretty=format:"- %s" | head -20)

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          body: |
            ## What's Changed
            ${{ steps.notes.outputs.notes }}

            ## Install / Update
            ```bash
            curl -sS https://get.useaxon.dev | sh
            axon update
            ```

            ## Images
            ```
            ghcr.io/brandonkorous/axon-backend:${{ needs.version.outputs.version }}
            ghcr.io/brandonkorous/axon-frontend:${{ needs.version.outputs.version }}
            ```
