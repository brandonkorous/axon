name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write
    packages: write

jobs:
    version:
        runs-on: ubuntu-latest
        outputs:
            bumped: ${{ steps.bump.outputs.bumped }}
            version: ${{ steps.bump.outputs.version }}
            previous: ${{ steps.bump.outputs.previous }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Determine version bump
              id: bump
              run: |
                  CURRENT=$(cat VERSION)
                  echo "previous=$CURRENT" >> "$GITHUB_OUTPUT"

                  # Get commits since last tag (or all commits if no tags)
                  LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  if [ -n "$LAST_TAG" ]; then
                    COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
                  else
                    COMMITS=$(git log --pretty=format:"%s" -20)
                  fi

                  if [ -z "$COMMITS" ]; then
                    echo "bumped=false" >> "$GITHUB_OUTPUT"
                    echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  # Determine bump type from conventional commits
                  BUMP="none"
                  if echo "$COMMITS" | grep -qE "^(feat|fix|refactor|perf|docs|style|test|chore)(\(.*\))?!:"; then
                    BUMP="major"
                  elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
                    BUMP="minor"
                  elif echo "$COMMITS" | grep -qE "^(fix|perf|refactor)(\(.*\))?:"; then
                    BUMP="patch"
                  fi

                  if [ "$BUMP" = "none" ]; then
                    echo "bumped=false" >> "$GITHUB_OUTPUT"
                    echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  # Parse and bump semver
                  IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
                  case "$BUMP" in
                    major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                    minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                    patch) PATCH=$((PATCH + 1)) ;;
                  esac

                  NEW="${MAJOR}.${MINOR}.${PATCH}"
                  echo "bumped=true" >> "$GITHUB_OUTPUT"
                  echo "version=$NEW" >> "$GITHUB_OUTPUT"
                  echo "Bump: $BUMP ($CURRENT → $NEW)"

            - name: Update VERSION and tag
              if: steps.bump.outputs.bumped == 'true'
              run: |
                  VERSION=${{ steps.bump.outputs.version }}
                  echo "$VERSION" > VERSION

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add VERSION
                  git commit -m "release: v${VERSION}"
                  git tag "v${VERSION}"
                  git push origin main --tags

    publish-images:
        needs: version
        if: needs.version.outputs.bumped == 'true'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                component: [backend, frontend]
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main

            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./${{ matrix.component }}/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}-${{ matrix.component }}:${{ needs.version.outputs.version }}
                      ghcr.io/${{ github.repository }}-${{ matrix.component }}:latest

    # Sandbox images must build in dependency order:
    #   base (root) → browser, code, media, full (extend base)
    #                → data, documents (extend code)
    #                → ml (extends data)

    publish-sandbox-base:
        needs: version
        if: needs.version.outputs.bumped == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with: { ref: main }
            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - uses: docker/build-push-action@v5
              with:
                  context: ./backend/axon/sandbox/images/base
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}/axon-sandbox-base:${{ needs.version.outputs.version }}
                      ghcr.io/${{ github.repository }}/axon-sandbox-base:latest

    publish-sandbox-tier1:
        needs: [version, publish-sandbox-base]
        if: needs.version.outputs.bumped == 'true'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - sandbox: browser
                      base: ghcr.io/${{ github.repository }}/axon-sandbox-base:latest
                    - sandbox: code
                      base: ghcr.io/${{ github.repository }}/axon-sandbox-base:latest
                    - sandbox: media
                      base: ghcr.io/${{ github.repository }}/axon-sandbox-base:latest
                    - sandbox: full
                      base: ghcr.io/${{ github.repository }}/axon-sandbox-base:latest
        steps:
            - uses: actions/checkout@v4
              with: { ref: main }
            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - uses: docker/build-push-action@v5
              with:
                  context: ./backend/axon/sandbox/images/${{ matrix.sandbox }}
                  build-args: BASE_IMAGE=${{ matrix.base }}
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}/axon-sandbox-${{ matrix.sandbox }}:${{ needs.version.outputs.version }}
                      ghcr.io/${{ github.repository }}/axon-sandbox-${{ matrix.sandbox }}:latest

    publish-sandbox-tier2:
        needs: [version, publish-sandbox-tier1]
        if: needs.version.outputs.bumped == 'true'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - sandbox: data
                      base: ghcr.io/${{ github.repository }}/axon-sandbox-code:latest
                    - sandbox: documents
                      base: ghcr.io/${{ github.repository }}/axon-sandbox-code:latest
        steps:
            - uses: actions/checkout@v4
              with: { ref: main }
            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - uses: docker/build-push-action@v5
              with:
                  context: ./backend/axon/sandbox/images/${{ matrix.sandbox }}
                  build-args: BASE_IMAGE=${{ matrix.base }}
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}/axon-sandbox-${{ matrix.sandbox }}:${{ needs.version.outputs.version }}
                      ghcr.io/${{ github.repository }}/axon-sandbox-${{ matrix.sandbox }}:latest

    publish-sandbox-tier3:
        needs: [version, publish-sandbox-tier2]
        if: needs.version.outputs.bumped == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with: { ref: main }
            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - uses: docker/build-push-action@v5
              with:
                  context: ./backend/axon/sandbox/images/ml
                  build-args: BASE_IMAGE=ghcr.io/${{ github.repository }}/axon-sandbox-data:latest
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}/axon-sandbox-ml:${{ needs.version.outputs.version }}
                      ghcr.io/${{ github.repository }}/axon-sandbox-ml:latest

    github-release:
        needs: [version, publish-images, publish-sandbox-tier3]
        if: needs.version.outputs.bumped == 'true'
        runs-on: ubuntu-latest
        outputs:
            notes: ${{ steps.notes.outputs.notes }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: main

            - name: Generate release notes
              id: notes
              run: |
                  PREVIOUS="v${{ needs.version.outputs.previous }}"
                  # Get conventional commit summaries (remove --all-match to allow OR matching)
                  NOTES=$(git log "${PREVIOUS}..HEAD" --pretty=format:"- %s" \
                    --grep="^feat" --grep="^fix" --grep="^perf" 2>/dev/null || \
                    git log "${PREVIOUS}..HEAD" --pretty=format:"- %s" | head -20)

                  # If no notes found, add a placeholder
                  if [ -z "$NOTES" ]; then
                    NOTES="- Various improvements and bug fixes"
                  fi

                  EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
                  echo "notes<<$EOF" >> "$GITHUB_OUTPUT"
                  echo "$NOTES" >> "$GITHUB_OUTPUT"
                  echo "$EOF" >> "$GITHUB_OUTPUT"

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ needs.version.outputs.version }}
                  name: v${{ needs.version.outputs.version }}
                  body: |
                      ## What's Changed
                      ${{ steps.notes.outputs.notes }}

                      ## Install / Update
                      ```bash
                      curl -sS https://get.useaxon.dev | sh
                      axon update
                      ```

                      ## Images
                      ```
                      ghcr.io/brandonkorous/axon-backend:${{ needs.version.outputs.version }}
                      ghcr.io/brandonkorous/axon-frontend:${{ needs.version.outputs.version }}
                      ```

                      ## Sandbox Images
                      ```
                      ghcr.io/brandonkorous/axon/axon-sandbox-base:${{ needs.version.outputs.version }}
                      ghcr.io/brandonkorous/axon/axon-sandbox-browser:${{ needs.version.outputs.version }}
                      ghcr.io/brandonkorous/axon/axon-sandbox-code:${{ needs.version.outputs.version }}
                      ghcr.io/brandonkorous/axon/axon-sandbox-data:${{ needs.version.outputs.version }}
                      ghcr.io/brandonkorous/axon/axon-sandbox-ml:${{ needs.version.outputs.version }}
                      ghcr.io/brandonkorous/axon/axon-sandbox-documents:${{ needs.version.outputs.version }}
                      ghcr.io/brandonkorous/axon/axon-sandbox-media:${{ needs.version.outputs.version }}
                      ghcr.io/brandonkorous/axon/axon-sandbox-full:${{ needs.version.outputs.version }}
                      ```

    discord-notify:
        needs: [version, github-release]
        if: needs.version.outputs.bumped == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Post release notes to Discord
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  VERSION: ${{ needs.version.outputs.version }}
                  NOTES: ${{ needs.github-release.outputs.notes }}
              run: |
                  # Check if webhook URL is set
                  if [ -z "$DISCORD_WEBHOOK_URL" ]; then
                    echo "⚠️ DISCORD_WEBHOOK_URL secret not set. Skipping Discord notification."
                    exit 0
                  fi

                  # Use fallback notes if empty
                  if [ -z "$NOTES" ]; then
                    NOTES="- Various improvements and bug fixes"
                  fi

                  # Truncate notes to fit Discord's 2000 char embed description limit
                  TRUNCATED_NOTES="${NOTES:0:1800}"
                  if [ "${#NOTES}" -gt 1800 ]; then
                    TRUNCATED_NOTES="${TRUNCATED_NOTES}..."
                  fi

                  # Build JSON payload with a rich embed
                  PAYLOAD=$(jq -n \
                    --arg title "Axon v${VERSION} Released" \
                    --arg url "https://github.com/brandonkorous/axon/releases/tag/v${VERSION}" \
                    --arg description "${TRUNCATED_NOTES}" \
                    --arg install "\`\`\`bash\ncurl -sS https://get.useaxon.dev | sh\naxon update\n\`\`\`" \
                    --arg footer "Axon — Self-hosted AI Command Center" \
                    --argjson color 6330516 \
                    '{
                      embeds: [{
                        title: $title,
                        url: $url,
                        description: ($description + "\n\n**Install / Update**\n" + $install),
                        color: $color,
                        footer: { text: $footer },
                        timestamp: (now | strftime("%Y-%m-%dT%H:%M:%SZ"))
                      }]
                    }')

                  echo "Sending Discord notification..."
                  if curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
                    -H "Content-Type: application/json" \
                    -d "$PAYLOAD"; then
                    echo "✅ Discord notification sent successfully"
                  else
                    echo "❌ Failed to send Discord notification"
                    exit 1
                  fi
